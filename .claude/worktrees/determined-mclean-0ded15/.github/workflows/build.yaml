name: build-addon

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-amd64:
    name: Build amd64 DEV image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Lowercase owner
        shell: bash
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Read add-on version from config.yaml
        shell: bash
        run: |
          VER="$(grep -oP '^version:\s*"\K[^"]+' config.yaml)"
          echo "ADDON_VERSION=${VER}" >> "$GITHUB_ENV"
          echo "Building DEV version: ${VER}"

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and publish amd64 DEV image
        shell: bash
        run: |
          echo "Publishing amd64 DEV image to GHCR"
          echo "Image: ghcr.io/${OWNER_LC}/amd64-addon-wmbus_mqtt_bridge-dev:${ADDON_VERSION}"

          docker buildx build \
            --progress=plain \
            --platform linux/amd64 \
            --build-arg BUILD_FROM=ghcr.io/home-assistant/amd64-base:3.20 \
            --push \
            -t ghcr.io/${OWNER_LC}/amd64-addon-wmbus_mqtt_bridge-dev:${ADDON_VERSION} \
            -t ghcr.io/${OWNER_LC}/amd64-addon-wmbus_mqtt_bridge-dev:dev \
            -f Dockerfile \
            .

  build-aarch64:
    name: Build aarch64 DEV image
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Lowercase owner
        shell: bash
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Read add-on version from config.yaml
        shell: bash
        run: |
          VER="$(grep -oP '^version:\s*"\K[^"]+' config.yaml)"
          echo "ADDON_VERSION=${VER}" >> "$GITHUB_ENV"
          echo "Building DEV version: ${VER}"

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and publish aarch64 DEV image
        shell: bash
        run: |
          echo "Publishing aarch64 DEV image to GHCR"
          echo "Image: ghcr.io/${OWNER_LC}/aarch64-addon-wmbus_mqtt_bridge-dev:${ADDON_VERSION}"

          docker buildx build \
            --progress=plain \
            --platform linux/arm64 \
            --build-arg BUILD_FROM=ghcr.io/home-assistant/aarch64-base:3.20 \
            --push \
            -t ghcr.io/${OWNER_LC}/aarch64-addon-wmbus_mqtt_bridge-dev:${ADDON_VERSION} \
            -t ghcr.io/${OWNER_LC}/aarch64-addon-wmbus_mqtt_bridge-dev:dev \
            -f Dockerfile \
            .