name: build-addon-dev

on:
  push:
    branches:
      - main
    paths:
      - 'rootfs/**'
      - 'Dockerfile'
      - 'config.yaml'
      - 'translations/**'
      - '.github/workflows/build.yaml'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: build-addon-dev-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build wmbus_mqtt_bridge_dev (${{ matrix.arch }})
    runs-on: ${{ matrix.runs_on }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            base_image: ghcr.io/home-assistant/amd64-base:3.20
            runs_on: ubuntu-latest
          - arch: aarch64
            platform: linux/arm64
            base_image: ghcr.io/home-assistant/aarch64-base:3.20
            runs_on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Gate (path-aware)
        id: gate
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "manual dispatch — building"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED="$(git diff --name-only HEAD~1 HEAD 2>/dev/null || true)"
          if [[ -z "${CHANGED}" ]]; then
            echo "cannot determine changed files — building defensively"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Files changed in this push:"
          echo "${CHANGED}" | sed 's/^/  /'

          PATTERN="^(rootfs/|Dockerfile|config\.yaml|translations/|\.github/workflows/build\.yaml$)"
          if echo "${CHANGED}" | grep -qE "${PATTERN}"; then
            echo "image-affecting change — building"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "no image-affecting changes (README/CHANGELOG/etc only) — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Debug GitHub context
        if: steps.gate.outputs.skip != 'true'
        shell: bash
        run: |
          echo "GITHUB_REPOSITORY=${GITHUB_REPOSITORY}"
          echo "GITHUB_REPOSITORY_OWNER=${GITHUB_REPOSITORY_OWNER}"
          echo "GITHUB_REF=${GITHUB_REF}"
          echo "arch=${{ matrix.arch }}"

      - name: Bump dev version in config.yaml and push
        if: steps.gate.outputs.skip != 'true' && matrix.arch == 'amd64'
        shell: bash
        run: |
          set -euo pipefail
          CFG="config.yaml"
          BASE_VER="$(sed -nE 's/^version:[[:space:]]*"?([^"[:space:]]+)"?[[:space:]]*$/\1/p' "${CFG}" | head -n1)"
          BASE_VER="$(echo "${BASE_VER}" | sed -E 's/^([0-9]+\.[0-9]+\.[0-9]+-dev).*/\1/')"
          NEW_VER="${BASE_VER}.${{ github.run_number }}"
          echo "Bumping dev version: ${BASE_VER} → ${NEW_VER}"
          sed -i -E "s/^(version:[[:space:]]*\").*\"/\1${NEW_VER}\"/" "${CFG}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${CFG}"
          git commit -m "ci(dev): bump version to ${NEW_VER} [skip ci]"
          git pull --rebase origin main
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare build variables
        if: steps.gate.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

          CFG="config.yaml"
          VER="$(sed -nE 's/^version:[[:space:]]*"?([^"[:space:]]+)"?[[:space:]]*$/\1/p' "${CFG}" | head -n1)"
          if [[ -z "${VER}" ]]; then
            echo "ERROR: cannot read version from ${CFG}"
            exit 1
          fi
          echo "ADDON_VERSION=${VER}" >> "$GITHUB_ENV"
          echo "Building dev version ${VER}"

      - name: Check GHCR token
        if: steps.gate.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${{ secrets.GHCR_TOKEN }}" ]]; then
            echo "ERROR: missing repository secret GHCR_TOKEN (PAT with read:packages and write:packages)."
            exit 1
          fi

      - name: Login to GHCR
        if: steps.gate.outputs.skip != 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: Kustonium
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.gate.outputs.skip != 'true'
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        if: steps.gate.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          docker buildx build \
            --progress=plain \
            --platform ${{ matrix.platform }} \
            --build-arg BUILD_FROM=${{ matrix.base_image }} \
            --build-arg ADDON_VERSION=${ADDON_VERSION} \
            --push \
            -t ghcr.io/${OWNER_LC}/${{ matrix.arch }}-addon-wmbus_mqtt_bridge-dev:dev \
            -t ghcr.io/${OWNER_LC}/${{ matrix.arch }}-addon-wmbus_mqtt_bridge-dev:${ADDON_VERSION} \
            -f Dockerfile \
            .
